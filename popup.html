<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>招聘沟通统计</title>
  <style>
    body { width: 340px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; }
    .wrap { padding: 16px; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 13px; line-height: 1.5; color: #4b5563; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 10px 12px; font-size: 14px; cursor: pointer; background: #16a085; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button:disabled { opacity: .75; cursor: default; }
    .site { margin: 10px 0; padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4; }
    .site.ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .site.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .error { margin-top: 10px; color: #b91c1c; font-size: 12px; white-space: pre-wrap; }
    .hidden { display: none !important; }
    .secondary { margin-top: 8px; background: #2563eb; }
    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.5); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    body.loading .spinner { display: inline-block; }
    body.loading #extractBtn { background: #0f766e; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>招聘沟通记录统计</h1>
    <p>轻松更新沟通记录</p>
    <div id="currentSite" class="site warn">正在检查当前网站...</div>
    <button id="extractBtn"><span class="spinner"></span><span id="btnText">同步当前聊天记录</span></button>
    <button id="overviewBtn" class="secondary">查看记录总览</button>
    <div id="error" class="error"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
